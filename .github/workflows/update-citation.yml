name: Update CITATION.cff on release

on:
  push:
    tags:
      - 'v*'

jobs:
  update-citation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version and date
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Update CITATION.cff
        run: |
          sed -i "s/^version:.*/version: ${{ steps.meta.outputs.version }}/" CITATION.cff
          sed -i "s/^date-released:.*/date-released: \"${{ steps.meta.outputs.date }}\"/" CITATION.cff

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff
          git commit -m "chore: update CITATION.cff for ${{ github.ref_name }}"
          git push origin HEAD:master